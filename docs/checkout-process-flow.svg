<svg width="100%" viewBox="0 0 680 730" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
<title>POS checkout process flow</title>
<desc>Linear flow from sign-in through register selection, cart building, payment selection, an atomic sale-generation transaction, to sale completion. A side note marks that new users hit a forced password reset between sign-in and register selection.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#8a8a86" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect width="680" height="730" fill="#ffffff"/>

<line x1="340" y1="96" x2="340" y2="156" stroke="#8a8a86" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="212" x2="340" y2="272" stroke="#8a8a86" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="328" x2="340" y2="388" stroke="#8a8a86" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="444" x2="340" y2="504" stroke="#8a8a86" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="560" x2="340" y2="620" stroke="#8a8a86" stroke-width="1.5" marker-end="url(#arrow)"/>

<text x="500" y="126" text-anchor="start" font-size="12" fill="#5F5E5A">New users only</text>

<g>
<rect x="190" y="40" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Sign in</text>
<text x="340" y="76" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Username + password</text>
</g>

<g>
<rect x="190" y="156" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="174" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Select register</text>
<text x="340" y="192" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Loads products + methods</text>
</g>

<g>
<rect x="190" y="272" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="290" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Build the cart</text>
<text x="340" y="308" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Add items, apply discount</text>
</g>

<g>
<rect x="190" y="388" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="406" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Choose payment</text>
<text x="340" y="424" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">One or more tenders</text>
</g>

<g>
<rect x="190" y="504" width="300" height="56" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.5"/>
<text x="340" y="522" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#042C53">generateSale runs</text>
<text x="340" y="540" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0C447C">Atomic MongoDB transaction</text>
</g>

<g>
<rect x="190" y="620" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="340" y="638" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Sale complete</text>
<text x="340" y="656" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Confirmation shown</text>
</g>

<text x="340" y="700" text-anchor="middle" font-size="12" fill="#5F5E5A">Blue = wrapped in a database transaction</text>
</svg>
